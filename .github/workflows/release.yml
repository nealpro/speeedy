name: Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 1.2.0). Finds the matching release commit."
        required: true

permissions:
  contents: write

concurrency:
  group: release-${{ github.workflow }}-${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      (github.event_name == 'push' && startsWith(github.event.head_commit.message, 'release: v'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version and commit
        id: meta
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
            VERSION="${VERSION#v}"
            SHA=$(git log --grep="^release: v${VERSION}" --format=%H -n 1)
            if [ -z "$SHA" ]; then
              echo "::error::No commit matching 'release: v${VERSION}'"
              exit 1
            fi
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
            SHA="${{ github.sha }}"
          else
            VERSION=$(jq -r .version package.json)
            SHA="${{ github.sha }}"
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"
          echo "Publishing v${VERSION} at ${SHA}"

      - name: Extract changelog notes
        run: |
          set -euo pipefail
          VERSION="${{ steps.meta.outputs.version }}"
          awk "/^## \\[${VERSION}\\]/{flag=1;next}/^## \\[/{flag=0}flag" CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "::error::Missing CHANGELOG.md section for ${VERSION}"
            exit 1
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.meta.outputs.version }}
          target_commitish: ${{ steps.meta.outputs.sha }}
          body_path: release-notes.md
          make_latest: true
